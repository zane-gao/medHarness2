schema_version: "1.0"
id: image_to_text_models
notion_section: Validation of Image-to-text AI Models
research_question: Which fresh modality-specific report-generation models minimize clinically significant errors under blinded review?
implementation:
  stage: workflow.benchmark-generation
  method: paired fresh-inference model benchmark with blinded clinician review
  primary_tools: [Tool 8, quality_gate]
model_policy:
  general_model: explicit_cloud_baseline_only
  medical_specialist_model: required_for_formal_candidates
  local_model: preferred
  api_model: no_raw_patient_data
inputs: [frozen image manifest, formal model registry]
outputs: [fresh reports, clinical error labels, quality_latency_pareto]
cohort:
  unit: model_case_pair
  strata: [cxr_chest, cr_abdomen, ct_chest, ct_abdomen, ct_head, mri_brain]
primary_endpoints: [clinically_significant_error_count]
secondary_endpoints: [omission_count, false_finding_count, preference, latency, peak_memory]
statistics: [paired_analysis, mixed_effects_count_model, bh_fdr]
validation_gates:
  - id: formal_fresh_only
    description: Every analyzed report has evidence_tier formal_fresh.
  - id: frozen_test_split
    description: Patient-level test manifest and hash are frozen.
  - id: blinded_clinician_review
    description: Model identities are blinded and clinician review is complete.
  - id: primary_endpoint_analysis
    description: Pre-registered paired model analysis is complete.
limitations:
  - Artifact and fallback reports are excluded from formal comparisons.
next_steps:
  - Produce a modality-specific formal model whitelist.
