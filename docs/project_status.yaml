  control_panel:
    status: validated
    summary: The internal project-status dashboard is rebuilt against the current evidence ledger while preserving the original long-page visual design; generated HTML is intentionally published by explicit user direction. Current and legacy reader panels preserve missing scores/percentiles as null and exclude or show them as unavailable instead of rendering zero/P0. Reader totals are separated from statistically eligible reader counts, so mock/fallback rows are excluded from aggregates without changing completed-reader accounting. Rule extraction keeps missing measurements distinct from explicit zero values during finding de-duplication. Static checks, source inspection, and the latest full regression (`1685 passed, 20 warnings`) pass. Formal benchmark case metrics preserve explicit zero agreement and adjudication counts instead of deriving nonzero fallbacks. Dashboard summaries and KPI rendering preserve explicit zero counts instead of falling back to stale analysis or artifact rows. Optional OCR preflight surfaces primary and configured verifier readiness separately. Complete Chinese OCR responses are not mislabeled as truncated. Legacy generation preserves caller case_id provenance in its input overlay. Explicit empty modality counts and aggregate arrays remain distinct from missing values. Model-role, top-level LLM, per-call provider, manifest, migration, ranking, provenance, and analysis identity fields use fail-closed type boundaries. Playwright visual regression remains unverified because the host lacks `libnspr4.so`.
