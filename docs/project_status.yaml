      - src/medharness2/tools/tool12_statistics.py
      - src/medharness2/utils/io.py
      - tests/test_full_design.py
      - tests/test_workflow_education.py
      - tests/workflows/test_benchmark_evaluation.py
      - tests/test_full_design.py
      - tests/test_llm_client.py
      - src/medharness2/checkpoints.py
