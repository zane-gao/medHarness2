    summary: 已提供 `ocr-benchmark` 冻结集评测 CLI（CER、数字/否定词、截断率、provisional winner）和 `live-smoke` 真实评委连通性/JSON 门禁。缺少 gold、candidate、声明路径或凭据时返回 blocked，不会用 0 分或 mock 结果冒充完成。
