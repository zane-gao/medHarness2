    next_gate: Expand the frozen CXR chest exploratory matrix, add clinician labels and formal validation IDs, then promote only models that pass the locked benchmark.
  clinical_validation:
    status: not_started
    summary: Ten pilot cases are packaged; the annotation validator confirms reader A, reader B, and adjudication are all not_started (0/10 complete), rejects path traversal, duplicate/unlisted case files, candidate-count drift, empty reference/candidate text, duplicate candidate identifiers, premature adjudication, and manifest/status mismatches. Pilot provenance hashes canonical source case content rather than only the case ID, so source drift changes the recorded hash.
    evidence_paths:
      - annotation/pilot10/manifest.jsonl
      - annotation/pilot10/annotation.schema.json
    next_gate: Complete both independent reader annotations, then adjudication, and rerun `medharness2 annotation validate --package-dir annotation/pilot10` before inter-rater reliability review.
  experiments:
    status: in_progress
    summary: Six executable YAML protocols and strict validation gates exist; all current results remain pilot with zero validated gates.
    evidence_paths:
      - experiments/protocols/e1_radiologist_evaluation.yaml
      - outputs/experiments/sample_data_2026-06-05_final_local_routed_52_20260606_reeval_v2_qualityfix_20260710/results.json
