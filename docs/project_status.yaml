  control_panel:
    status: validated
    summary: The internal project-status dashboard has been rebuilt against the current evidence ledger while preserving the original long-page visual design; generated HTML is intentionally published by explicit user direction. Current and legacy reader panels preserve missing scores/percentiles as null and exclude or show them as unavailable instead of rendering zero/P0. Reader totals are now separated from statistically eligible reader counts, so mock/fallback rows are excluded from aggregates without changing completed-reader accounting. Static checks and source inspection passed. Current full regression is 474 passed with 18 warnings. Playwright desktop/mobile execution was not completed because this environment lacks the @playwright/test package and Chromium browser, so visual regression remains an environment follow-up rather than evidence of failure.
    evidence_paths:
