workstreams:
  contracts:
    status: validated
    summary: Versioned v2 case, finding, generated-report, hazard, run, optional audit, and workflow2/workflow3 aggregate contracts are enforced; aggregate boundaries retain additive compatibility while rejecting malformed reader, denominator, percentile, and count fields. Audit hashes remain bound to deterministic primary artifacts, and the 52-case v1 migration path is directly validatable.
    evidence_paths:
      - docs/schemas/index.json
      - outputs/sample_data_2026-06-05_final_local_routed_52_20260606_reeval_v2_qualityfix_20260710/run_summary.json
      - src/medharness2/contracts/migrations.py
      - tests/contracts/test_migrations.py
      - tests/test_validation.py
    next_gate: Validate a frozen run with nonzero T4/T5/T6 audit artifacts and add contract coverage for any newly introduced aggregate fields.
  tools:
    status: in_progress
    summary: T1 uses a strict real LLM judge; T2/T4 use deterministic templates plus LLM judgement; T5/T6 preserve deterministic primary results and emit hash-linked LLM audit artifacts. Single-report T1 now propagates general_judge consistency_runs into execution and checkpoint inputs, and its retry/fail-fast exception boundary is aligned with Tool4. The strong profile now requests two general_judge calls as well as two hazard_reviewer calls, preserving retest provenance for both judge families. Formal benchmark verification now rejects T1 artifacts that do not satisfy the configured consistency_runs requirement, while route/config snapshots bind role retry and consistency parameters so drift invalidates reuse. A pure-DMX 11-case run passed 11/11 with 99 verified role artifacts and zero fallback after fixing the T5 suggested-error-type prompt/schema mismatch. Test-retest instability remains material, so clinical gold-set calibration and repeated-run reliability validation are outstanding. Tool9 now consumes explicit score or metric-level confidence intervals when present and keeps overlapping cutoff candidates for review without fabricating intervals when absent.
    evidence_paths:
      - docs/llm_tooling_upgrade_20260710.md
      - docs/llm_tools_synthetic_smoke_20260710.json
      - src/medharness2/tools/tool1_likert.py
      - src/medharness2/tools/tool2_extract.py
      - src/medharness2/tools/tool4_hazard.py
      - src/medharness2/alignment/audit.py
      - src/medharness2/tools/tool6_structure_diff.py
      - src/medharness2/extractors/rules.py
      - tests/extractors/test_cxr.py
      - tests/alignment/test_matcher.py
    next_gate: Freeze repeated-run reliability targets, complete dual-reader gold labels, and benchmark every model role before a formal case run.
  ocr:
    status: in_progress
    summary: OCR 现已升级为逐页 300 DPI 图像管线，记录页级 hash、provider/model/role、页序、墨量、空白页跳过和疑似截断；缓存 sidecar 绑定 case/source/provider/model/role，并新增缓存文本 `text_sha256` 与质量摘要一致性校验，模型变更、文本替换或 verifier 状态矛盾不会误复用旧 OCR。配置声明 `ocr_verifier` 但调用方未接入 verifier client 时，结果强制降为 `review_required`。OCR 结果现在显式分为 passed、review_required、blocked：空结果或疑似截断不再作为可用 report_text 进入样本清单，verifier disagreement/失败只进入人工复核，不静默改写主 OCR。北川参考报告作为当前文本 benchmark gold 已就绪；dmx_strong 已提供 Doubao Seed 候选主 OCR 与独立 Qwen OCR verifier 的 audit-only 路由，但二者仍是候选，尚未凭宣传或单例样本指定生产 winner；必须在北川冻结集上按 clinical CER、数字/否定词、截断率和重测一致性实测。独立多模态模型只允许产出差异审计，不静默改写主 OCR。
    evidence_paths:
      - docs/superpowers/specs/2026-07-11-dmx-doubao-ocr-benchmark-design.md
      - outputs/ocr_quality_audit_qwen3vl4b_20260711/summary.json
      - outputs/ocr_quality_audit_qwen3vl4b_20260711/ocr_completeness_audit.png
    next_gate: 在北川冻结 10 例（CR4/CT4/MRI2）上接入豆包/PaddleOCR/Qwen 候选并做双次重复调用；按 clinical CER 和 material-error rate 选择 primary，verifier 仅输出 disagreement artifact。
  routing:
    status: validated
    summary: "路由器已改为三种主要模态（cxr/ct/mri）硬约束；body_part 不再阻塞兼容模型，只作为候选排序信号。配置中的 default_models wildcard 现在会按模态展开全部兼容候选，不再把 wildcard 当作普通模型名；当前挂载路径上的完整 52 例 dmx_strong preflight 已实测通过：cxr/ct/mri=20/25/7、52/52 有本地候选、0 fallback，另有 494 个 fresh 和 175 个 artifact 本地候选。preflight 对存在但空病例目录现在 fail-closed 返回 no_cases_discovered，不会把 cases=0 误报为通过。VLM 模态识别补充 MRI/CT/X-ray 常见句式归一化，并覆盖 DICOM、图片扩展名和 unknown 路径测试。"
    evidence_paths:
      - src/medharness2/generators/registry.py
      - src/medharness2/tools/tool7_modality.py
      - tests/test_modality_routing.py
    next_gate: 真实资产路由 smoke 已完成；下一步只需在同一 52 例清单上接入真实 OCR provider，确认 OCR 文本质量不改变已验证的三模态路由覆盖。
  scientific_metrics:
    status: in_progress
    summary: 已修复 Likert 归一化、三条 reader 聚合路径的归一化口径漂移、Tool1 mock provenance、统计字段污染、缺失 reader 分数误填 0、fallback/mock 过滤、缺失指标排名、缺失 hazard 字段默认低风险、单样本 CI 伪确定性、教育 provenance、教育反馈缺失统计门禁、教育报告缺失/非法 Likert 不再伪造 0 分、教育 blocked 状态现在以非零 CLI 退出、排名 cutoff 近似并列保留、正式 benchmark 的 Welch+Holm 汇总、并列百分位、小样本 t 区间、散文 JSON、参考图 recall、seed/cache、OCR sidecar case 绑定、非 CXR slug、Retry-After、Tool2 宽泛异常、Tool1/Tool4 评委异常边界、评委 prompt 数据边界、失败病例分母及 analyze_run 成功/失败率汇总、Tool1 重测一致性记录、placeholder provenance、迁移失败原因、hazard canonical 字段优先级、DMX 顶层 mock 路由、生成 fallback 标记、Tool1 解释 grounding 诊断字段、Tool4 重测 provenance 与 fallback 一致性门禁，以及 Tool9/Tool10/Tool11/Tool12 对 NaN、正负无穷和非法 p 值的 fail-closed 过滤；batch-readers、department 和 analyze-run 对空输入现在返回 no_cases_discovered 并以非零 CLI 退出。grounding 仅用于审计，不改变 Likert 分数；仍需真实北川冻结集验证临床 CER 和临床标签一致性。
    evidence_paths:
      - src/medharness2/tools/tool9_rank.py
      - src/medharness2/tools/tool10_modelwise.py
      - src/medharness2/tools/tool12_statistics.py
      - src/medharness2/utils/io.py
      - tests/test_full_design.py
