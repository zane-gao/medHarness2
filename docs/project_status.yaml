      - src/medharness2/alignment/scoring.py
      - src/medharness2/workflows/education.py
      - tests/test_workflow_education.py
      - src/medharness2/tools/tool1_likert.py
      - src/medharness2/contracts/migrations.py
      - src/medharness2/tools/tool4_hazard.py
    next_gate: 在北川冻结集上重跑候选模型和双次重复调用，验证 fallback_count、recall、seed/cache、评委一致性和临床错误率，再决定 formal benchmark promotion。
