workstreams:
  contracts:
    status: validated
    summary: Versioned v2 case, finding, generated-report, hazard, run, and optional audit contracts are enforced recursively; audit hashes are bound to deterministic primary artifacts, and the 52-case v1 migration path is directly validatable.
    evidence_paths:
      - docs/schemas/index.json
      - outputs/sample_data_2026-06-05_final_local_routed_52_20260606_reeval_v2_qualityfix_20260710/run_summary.json
