      - tests/contracts/test_migrations.py
      - tests/test_validation.py
    next_gate: Add typed contracts for remaining workflow2/workflow3 aggregate payloads and validate a frozen run with nonzero T4/T5/T6 audit artifacts.
  tools:
    status: in_progress
    summary: T1 uses a strict real LLM judge; T2/T4 use deterministic templates plus LLM judgement; T5/T6 preserve deterministic primary results and emit hash-linked LLM audit artifacts. A pure-DMX 11-case run passed 11/11 with 99 verified role artifacts and zero fallback after fixing the T5 suggested-error-type prompt/schema mismatch. Test-retest instability remains material, so clinical gold-set calibration and repeated-run reliability validation are outstanding.
    evidence_paths:
      - docs/llm_tooling_upgrade_20260710.md
      - docs/llm_tools_synthetic_smoke_20260710.json
      - src/medharness2/tools/tool1_likert.py
      - src/medharness2/tools/tool2_extract.py
      - src/medharness2/tools/tool4_hazard.py
      - src/medharness2/alignment/audit.py
      - src/medharness2/tools/tool6_structure_diff.py
      - src/medharness2/extractors/rules.py
      - tests/extractors/test_cxr.py
      - tests/alignment/test_matcher.py
    next_gate: Freeze repeated-run reliability targets, complete dual-reader gold labels, and benchmark every model role before a formal case run.
  ocr:
    status: in_progress
    summary: DMX model discovery and image-only nonce probes confirm that doubao-seed-2-1-pro-260628, doubao-seed-1-6-vision-250815, and qwen-vl-ocr-latest all accept real image input. Doubao Seed 2.1 Pro exactly transcribed one real CXR clinical section and returned complete findings/impression for one dense CT report. The legacy local Qwen3-VL 4B cache has six definite and seven suspected truncations, all among 25 CT reports, because max_new_tokens was 384.
    evidence_paths:
      - docs/superpowers/specs/2026-07-11-dmx-doubao-ocr-benchmark-design.md
      - outputs/ocr_quality_audit_qwen3vl4b_20260711/summary.json
      - outputs/ocr_quality_audit_qwen3vl4b_20260711/ocr_completeness_audit.png
    next_gate: Approve the frozen 10-case OCR benchmark design, rerun every candidate with non-truncating output budgets, produce visual gold text, and select the production OCR route by clinical CER and material-error rate.
  generation:
    status: in_progress
    summary: Every report has an evidence tier. Benchmark planning separates eligible/rejected models, formal candidate coverage, and modality-aware image/volume assets. Eleven frozen CXR chest cases completed true Qwen3-VL 8B fresh inference with do_sample=false and seed 20260710. The reports remain exploratory_fresh, contain only five unique outputs, and the 52-case legacy run contains no formal_fresh report.
