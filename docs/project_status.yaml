  generation:
    status: in_progress
    summary: Every report has an evidence tier. Benchmark planning separates eligible/rejected models, formal candidate coverage, and modality-aware image/volume assets. Eleven frozen CXR chest cases completed true Qwen3-VL 8B fresh inference with do_sample=false and seed 20260710. The reports remain exploratory_fresh, contain only five unique outputs, and the 52-case legacy run contains no formal_fresh report.
