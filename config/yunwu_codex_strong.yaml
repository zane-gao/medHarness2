# Explicit workload-routed contingency profile validated on 2026-07-11.
# DMX remains preferred but currently lacks enough quota for production token
# budgets. Image/report judgement and extraction use Yunwu; structured audit
# roles use the Codex proxy; the independent hazard reviewer uses Claude via
# Yunwu. Runtime never changes these routes automatically.

llm:
  provider: mock
  model: gpt-5.6-terra
  local_cli_python_bin: /data/ubuntu_conda/envs/medharness_merlin/bin/python
  max_retries: 3
  timeout_sec: 60
  retry_initial_sec: 0.5
  temperature: 0.0
  chat_max_tokens: 1024

privacy:
  enforce_external: false
  block_external_images: false
  allowed_external_classifications:
    - raw_clinical_text
    - deidentified_structured
    - synthetic_test
    - public_nonclinical

model_roles:
  general_judge: &yunwu_gpt
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    schema_max_attempts: 2
    transport_max_retries: 1
    timeout_sec: 120
    temperature: 0.0
    max_tokens: 2048
  finding_extractor:
    <<: *yunwu_gpt
    max_tokens: 4096
  education:
    <<: *yunwu_gpt
    max_tokens: 4096
  report_generation:
    provider: chat_completions
    model: qwen3-vl-plus
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    schema_max_attempts: 2
    transport_max_retries: 1
    timeout_sec: 120
    temperature: 0.0
    max_tokens: 4096
  report_fusion:
    <<: *yunwu_gpt
    max_tokens: 4096

  alignment_auditor: &codex_gpt
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: CODEX_PROXY_GPT_API_KEY
    base_url: https://codex.0u0o.com/v1
    schema_max_attempts: 2
    transport_max_retries: 1
    timeout_sec: 120
    temperature: 0.0
    max_tokens: 2048
  hazard_primary:
    <<: *codex_gpt
  structure_auditor:
    <<: *codex_gpt

  hazard_reviewer:
    provider: chat_completions
    model: claude-opus-4-8
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    schema_max_attempts: 2
    transport_max_retries: 1
    timeout_sec: 120
    temperature: 0.0
    seed: 0
    max_tokens: 2048
  hazard_adjudicator:
    provider: chat_completions
    model: gpt-5.6-terra-ultra
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    schema_max_attempts: 2
    transport_max_retries: 1
    timeout_sec: 120
    temperature: 0.0
    max_tokens: 2048

extractor:
  backend: auto
  template_path: config/templates/default_finding_template.json

generator:
  cloud_fallback_enabled: false
  reference_assisted_generation: false
  include_legacy_ready_models: true
  legacy_config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
  default_models:
    - maira_2
    - chexagent_srrg_findings_full
    - chexagent_srrg_impression_full
    - medgemma_srrg_findings
    - medgemma_srrg_impression
    - lingshu_srrg_impression
    - medmo_4b
    - merlin_fresh
    - medmo_4b_next
    - qwen25vl_med_grpo_report_generation
    - qwen25vl_med_grpo_report_generation_v2
    - qwen25vl_flare2025_lora
    - radiology_infer_mini
    - yunwu_general
  external_vlm_enabled: true
  external_vlm_key: yunwu_general
  external_vlm_title: Yunwu General Imaging Candidate
  external_vlm_model_role: report_generation
  external_vlm_input_capabilities: [image_2d]
  fusion_enabled: true
  fusion_model_role: report_fusion

ranking:
  top_n: 3
  weights:
    likert_mean: 0.4
    structure_score: 0.3
    finding_coverage: 0.3

alignment:
  tolerance_mm: 5.0

modality_map:
  DX: cxr
  CR: cxr
  XR: cxr
  CT: ct
  MR: mri
  MRI: mri
  pathology: pathology
