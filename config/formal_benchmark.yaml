# Formal benchmark profile. Models remain exploratory until clinician validation
# explicitly promotes an entry to evidence_tier: formal_fresh.

llm:
  provider: mock

privacy:
  enforce_external: true
  block_external_images: true
  allowed_external_classifications: [deidentified_structured, synthetic_test, public_nonclinical]

extractor:
  backend: auto

generator:
  cloud_fallback_enabled: false
  reference_assisted_generation: false
  include_legacy_ready_models: true
  legacy_config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
  default_models: []
  local_models: []

ranking:
  top_n: 3
  weights:
    likert_mean: 0.4
    structure_score: 0.3
    finding_coverage: 0.3

alignment:
  tolerance_mm: 5.0
