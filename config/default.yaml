llm:
  provider: mock
  model: gpt-5.5
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  timeout_sec: 60
  max_retries: 3
  retry_initial_sec: 0.25
  temperature: 0.0
  local_cli_python_bin: /data/ubuntu_conda/envs/medharness_merlin/bin/python
  local_cli_script: /data/isbi/gzp/medHarness/scripts/run_report_generation.py
  local_cli_config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
  local_cli_device: cuda:0
  local_cli_dtype: bf16
  local_cli_max_new_tokens: 512
  local_cli_timeout_sec: 1800
  local_cli_pdf_max_pages: 3
  local_hf_model_path: /data/cyf/shared_data/hd_data/qwen3-vl-4B
  local_hf_device: cuda:0
  local_hf_dtype: bf16
  local_hf_max_new_tokens: 512
  local_hf_pdf_max_pages: 3

privacy:
  enforce_external: false
  block_external_images: false
  allowed_external_classifications:
    - deidentified_structured
    - synthetic_test
    - public_nonclinical

model_roles:
  report_generation:
    provider: chat_completions
    model: qwen3-vl-plus
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 4096
  report_fusion:
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 4096

extractor:
  backend: auto
  template_path: config/templates/default_finding_template.json

generator:
  cloud_fallback_enabled: true
  reference_assisted_generation: false
  include_legacy_ready_models: true
  legacy_config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
  default_models:
    - maira_2
    - chexagent_srrg_findings_full
    - chexagent_srrg_impression_full
    - medgemma_srrg_findings
    - medgemma_srrg_impression
    - lingshu_srrg_impression
    - medmo_4b
    - merlin_fresh
    - medmo_4b_next
    - qwen25vl_med_grpo_report_generation
    - qwen25vl_med_grpo_report_generation_v2
    - qwen25vl_flare2025_lora
    - radiology_infer_mini
    - yunwu_general
  external_vlm_enabled: true
  external_vlm_key: yunwu_general
  external_vlm_title: Yunwu General Imaging Candidate
  external_vlm_model_role: report_generation
  external_vlm_input_capabilities: [image_2d]
  fusion_enabled: true
  fusion_model_role: report_fusion
  local_models:
    - key: chexagent
      title: CheXagent artifact
      source: artifact_reuse
      supported_modalities: [xray, cxr]
      supported_body_parts: [chest, lung]
      source_generation_jsonl: /data/isbi/gzp/baseline/medLLM3/outputs/runs/chexagent_openi_full_weight_100/generation.jsonl
      notes: Existing CXR artifact from medHarness/medLLM3; fast default smoke path.

ranking:
  top_n: 3
  weights:
    likert_mean: 0.4
    structure_score: 0.3
    finding_coverage: 0.3

alignment:
  tolerance_mm: 5.0

modality_map:
  DX: cxr
  CR: cxr
  XR: cxr
  CT: ct
  MR: mri
  MRI: mri
  pathology: pathology
