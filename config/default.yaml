llm:
  provider: mock
  model: gpt-5.5
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  timeout_sec: 60
  max_retries: 3
  retry_initial_sec: 0.25
  temperature: 0.0

extractor:
  backend: cxr_rule
  template_path: config/templates/default_finding_template.json

generator:
  cloud_fallback_enabled: true
  default_models:
    - chexagent
  local_models:
    - key: chexagent
      title: CheXagent artifact
      source: artifact_reuse
      supported_modalities: [xray, cxr]
      source_generation_jsonl: /data/isbi/gzp/baseline/medLLM3/outputs/runs/chexagent_openi_full_weight_100/generation.jsonl
      notes: Existing CXR artifact from medHarness/medLLM3; fast default smoke path.
    - key: maira_2
      title: MAIRA-2 fresh
      source: medharness_cli
      supported_modalities: [xray, cxr]
      medharness_model_key: maira_2
      script_path: /data/isbi/gzp/medHarness/scripts/run_report_generation.py
      config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
      device: cuda:0
      dtype: bf16
      max_new_tokens: 160
      timeout_sec: 1800
      ready: true
      notes: Fresh adapter through the existing medHarness report generation CLI.

ranking:
  top_n: 3
  weights:
    likert_mean: 0.4
    structure_score: 0.3
    finding_coverage: 0.3

alignment:
  tolerance_mm: 5.0

modality_map:
  DX: cxr
  CR: cxr
  XR: cxr
  CT: ct
  MR: mri
  MRI: mri
  pathology: pathology
