# Copy this file and pass it with:
#   medharness2 workflow single-case --config path/to/config.yaml ...
#
# Keep API keys and tokens in environment variables, not in this file.

llm:
  provider: mock
  model: gpt-5.5
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  timeout_sec: 60
  max_retries: 3
  retry_initial_sec: 0.25
  temperature: 0.0
  # For local OCR/fallback without a cloud API:
  #   provider: local_vlm_cli
  #   model: qwen25vl_7b_instruct
  # Or use a directly available HF VLM directory:
  #   provider: local_hf_vlm
  #   model: qwen3-vl-4b
  local_cli_python_bin: python
  local_cli_script: /data/isbi/gzp/medHarness/scripts/run_report_generation.py
  local_cli_config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
  local_cli_device: cuda:0
  local_cli_dtype: bf16
  local_cli_max_new_tokens: 512
  local_cli_timeout_sec: 1800
  local_cli_pdf_max_pages: 3
  local_hf_model_path: /data/cyf/shared_data/hd_data/qwen3-vl-4B
  local_hf_device: cuda:0
  local_hf_dtype: bf16
  local_hf_max_new_tokens: 512
  local_hf_pdf_max_pages: 3

privacy:
  enforce_external: true
  block_external_images: true
  allowed_external_classifications:
    - deidentified_structured
    - synthetic_test
    - public_nonclinical

extractor:
  backend: auto
  template_path: config/templates/default_finding_template.json

generator:
  cloud_fallback_enabled: true
  reference_assisted_generation: false
  include_legacy_ready_models: true
  legacy_config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
  default_models:
    - chexagent
  local_models:
    - key: chexagent
      title: CheXagent artifact
      source: artifact_reuse
      supported_modalities: [xray, cxr]
      supported_body_parts: [chest, lung]
      source_generation_jsonl: /data/isbi/gzp/baseline/medLLM3/outputs/runs/chexagent_openi_full_weight_100/generation.jsonl
      notes: Fast smoke path that reuses an existing generation artifact.
    - key: maira_2
      title: MAIRA-2 fresh
      source: medharness_cli
      supported_modalities: [xray, cxr]
      supported_body_parts: [chest, lung]
      medharness_model_key: maira_2
      python_bin: /data/miniconda3/envs/deepseek_2/bin/python
      script_path: /data/isbi/gzp/medHarness/scripts/run_report_generation.py
      config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
      device: cuda:0
      dtype: bf16
      max_new_tokens: 160
      timeout_sec: 1800
      ready: true
      notes: Fresh inference through the existing medHarness report generation CLI.
    - key: merlin_fresh
      title: Merlin Fresh
      source: medharness_cli
      supported_modalities: [ct]
      supported_body_parts: [abdomen, pelvis, multi-organ]
      medharness_model_key: merlin_fresh
      script_path: /data/isbi/gzp/medHarness/scripts/run_report_generation.py
      config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
      device: cuda:0
      dtype: bf16
      max_new_tokens: 160
      timeout_sec: 1800
      ready: true
      notes: Abdominal CT fresh inference when a prepared NIfTI volume is available.
    - key: brain_gemma3d
      title: BrainGemma3D
      source: medharness_cli
      supported_modalities: [mri]
      supported_body_parts: [brain, head]
      medharness_model_key: brain_gemma3d
      script_path: /data/isbi/gzp/medHarness/scripts/run_report_generation.py
      config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
      device: cuda:0
      dtype: bf16
      max_new_tokens: 160
      timeout_sec: 1800
      ready: true
      notes: Brain MRI fresh inference when a prepared NIfTI volume is available.

ranking:
  top_n: 3
  weights:
    likert_mean: 0.4
    structure_score: 0.3
    finding_coverage: 0.3

alignment:
  tolerance_mm: 5.0

modality_map:
  DX: cxr
  CR: cxr
  XR: cxr
  CT: ct
  MR: mri
  MRI: mri
  pathology: pathology
