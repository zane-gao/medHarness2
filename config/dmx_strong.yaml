# Strong external-judge routing through the OpenAI-compatible DMX endpoint.
# Export DMX_API_KEY in the process environment. Never store the key here.

llm:
  provider: mock
  model: gpt-5.6-terra
  max_retries: 3
  timeout_sec: 60
  retry_initial_sec: 5.0
  temperature: 0.0
  chat_max_tokens: 1024

# Quality-first research profile. Raw clinical text/image transfer is allowed
# by current project direction; re-enable governance before clinical release.
privacy:
  enforce_external: false
  block_external_images: false
  allowed_external_classifications:
    - raw_clinical_text
    - deidentified_structured
    - synthetic_test
    - public_nonclinical

model_roles:
  hazard_primary:
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 120
    temperature: 0.0
    max_tokens: 2048
  hazard_reviewer:
    provider: chat_completions
    model: claude-opus-4-8
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 120
    temperature: 0.0
    seed: 0
    max_tokens: 2048
  hazard_adjudicator:
    provider: chat_completions
    model: gpt-5.6-sol
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 2048
  general_judge:
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 120
    temperature: 0.0
    max_tokens: 2048
  finding_extractor:
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 2048
  alignment_auditor:
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 2048
  structure_auditor:
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 2048
  education:
    provider: chat_completions
    model: gpt-5.6-terra
    api_key_env: DMX_API_KEY
    base_url: https://www.DMXAPI.cn/v1
    schema_max_attempts: 2
    transport_max_retries: 2
    timeout_sec: 120
    temperature: 0.0
    max_tokens: 4096

extractor:
  backend: auto
  template_path: config/templates/default_finding_template.json

generator:
  cloud_fallback_enabled: false
  reference_assisted_generation: false
  include_legacy_ready_models: true
  legacy_config_path: /data/isbi/gzp/medHarness/configs/reportgen_models.yaml
  default_models:
    - chexagent

ranking:
  top_n: 3
  weights:
    likert_mean: 0.4
    structure_score: 0.3
    finding_coverage: 0.3

alignment:
  tolerance_mm: 5.0

modality_map:
  DX: cxr
  CR: cxr
  XR: cxr
  CT: ct
  MR: mri
  MRI: mri
  pathology: pathology
