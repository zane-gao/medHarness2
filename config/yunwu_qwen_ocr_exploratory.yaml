# Exploratory-only Yunwu visual OCR profile.
#
# This profile is for direct OCR smoke runs and debugging the page-level
# pipeline. It is intentionally not a formal OCR benchmark profile: the
# research manifest has fixed candidate IDs for Doubao/Paddle and the
# provenance gate will reject this Qwen model if it is used there.
# Export YUNWU_API_KEY in the process environment; never store credentials in
# this file.

llm:
  provider: chat_completions
  model: qwen3-vl-plus
  api_key_env: YUNWU_API_KEY
  base_url: https://yunwu.ai/v1
  max_retries: 3
  timeout_sec: 180
  retry_initial_sec: 0.25
  temperature: 0.0
  chat_max_tokens: 4096

privacy:
  enforce_external: false
  block_external_images: false
  allowed_external_classifications:
    - raw_clinical_text
    - deidentified_structured
    - synthetic_test
    - public_nonclinical

model_roles:
  ocr_primary:
    provider: chat_completions
    model: qwen3-vl-plus
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    transport_max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 4096
  ocr_verifier:
    provider: chat_completions
    model: qwen-vl-max
    api_key_env: YUNWU_API_KEY
    base_url: https://yunwu.ai/v1
    transport_max_retries: 2
    timeout_sec: 180
    temperature: 0.0
    max_tokens: 4096

extractor:
  backend: auto
  template_path: config/templates/default_finding_template.json

generator:
  cloud_fallback_enabled: false
  reference_assisted_generation: false
  default_models: []

ranking:
  top_n: 3
  weights:
    likert_mean: 0.4
    structure_score: 0.3
    finding_coverage: 0.3

alignment:
  tolerance_mm: 5.0

modality_map:
  DX: cxr
  CR: cxr
  XR: cxr
  CT: ct
  MR: mri
  MRI: mri
  pathology: pathology
